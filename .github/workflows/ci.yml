name: dbt CI Pipeline

on:
  pull_request:
    branches:
      - main
    paths:
      - 'dbt/**'
      - '.github/workflows/ci.yml'

jobs:
  dbt-ci:
    name: Lint & Test dbt Models
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-bigquery sqlfluff-templater-dbt

      - name: Write GCP Credentials File
        run: |
          mkdir -p keys
          echo '${{ secrets.GCP_SA_KEY_JSON }}' > keys/gcp-service-account.json

      - name: Install dbt Dependencies
        run: |
          cd dbt
          dbt deps

      - name: SQLFluff Lint models
        run: |
          cd dbt
          sqlfluff lint models/

      - name: dbt Compile
        run: |
          cd dbt
          dbt compile --profiles-dir . --target dev

      - name: dbt Test (Schema & Singular validations)
        run: |
          cd dbt
          dbt test --profiles-dir . --target dev
